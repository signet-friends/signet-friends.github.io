<header class="site-header">
  <div class="wrap site-header__inner">
    <a class="brand" href="{{ "/" | relLangURL }}">
      {{ partial "triad.html" (dict "size" 28 "variant" "mono") }}
      <span class="brand__name">FRIENDS</span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" />
    <label for="nav-toggle" class="nav-burger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </label>

    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        {{ if .HasChildren }}
        <div class="nav-group{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} is-open-section{{ end }}">
          <a href="{{ .URL | relLangURL }}" class="site-nav__link nav-group__parent{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} is-active{{ end }}">
            {{ .Name }}<span class="nav-group__caret" aria-hidden="true"></span>
          </a>
          <div class="nav-group__menu">
            {{ range .Children }}
            <a href="{{ .URL | relLangURL }}" class="nav-group__item{{ if $.IsMenuCurrent "main" . }} is-active{{ end }}">{{ .Name }}</a>
            {{ end }}
          </div>
        </div>
        {{ else }}
        <a href="{{ .URL | relLangURL }}" class="site-nav__link{{ if $.IsMenuCurrent "main" . }} is-active{{ end }}">{{ .Name }}</a>
        {{ end }}
      {{ end }}
    </nav>
  </div>
</header>
