<header class="site-header">
  <div class="wrap site-header__inner">
    <a class="brand" href="{{ "/" | relLangURL }}">
      {{ partial "triad.html" (dict "size" 28 "variant" "mono") }}
      <span class="brand__name">FRIENDS</span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" />
    <label for="nav-toggle" class="nav-burger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </label>

    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relLangURL }}" class="site-nav__link{{ if $.IsMenuCurrent "main" . }} is-active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
